<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>AWS UG Cloud Del Norte</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
    <!-- liora panel scaffold — mountLioraPanel wires babylon.js into #liora-canvas -->
    <div class="liora-bezel" style="display:none" id="liora-host">
      <div class="liora-panel-wrap">
        <canvas id="liora-canvas" aria-hidden="true"></canvas>
        <div id="liora-shimmer" aria-hidden="true"></div>
        <div id="liora-status-bar" role="status" aria-live="polite">
          <span id="liora-sys-status"></span>
        </div>
      </div>
    </div>
    <script type="module">
      if (location.hostname === 'dev.clouddelnorte.org' || location.hostname === 'localhost') {
        import('/liora-embed/liora-embed.js').then(({ mountLioraPanel }) => {
          const host = document.getElementById('liora-host');
          if (host) {
            host.style.display = '';
            mountLioraPanel('/liora');
          }
        });
      }
    </script>
  </body>
</html>
