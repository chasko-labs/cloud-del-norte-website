---
# woodpecker ci — cloud-del-norte-website quality gates
# repo: chasko-labs/cloud-del-norte-website
# runs on pull_request, push to main, and manual trigger
# does NOT deploy — see deploy.yml for deploy pipeline

when:
  - event: [pull_request, push, manual]
    branch: main
    path:
      include:
        - src/**
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.js"
        - package.json
        - .woodpecker/ci.yml

steps:
  # tier-0: draft-gate
  - name: tier-0-draft-gate
    image: alpine:3.21
    commands:
      - |
        if [ "${CI_COMMIT_PULL_REQUEST_LABELS}" != "" ]; then
          echo "$CI_COMMIT_PULL_REQUEST_LABELS" | grep -q "draft" && echo "draft pr — skipping" && exit 78 || true
        fi
        echo "not a draft — continuing"

  # tier-0: skip-ci-gate
  - name: tier-0-skip-ci-gate
    image: alpine:3.21
    depends_on: [tier-0-draft-gate]
    commands:
      - |
        echo "$CI_COMMIT_MESSAGE" | grep -qi "\[skip ci\]" && echo "skip ci requested — skipping" && exit 78 || true
        echo "no skip-ci flag — continuing"

  # tier-0: metadata
  - name: tier-0-metadata
    image: alpine:3.21
    depends_on: [tier-0-skip-ci-gate]
    commands:
      - echo "repo       $CI_REPO"
      - echo "commit     $CI_COMMIT_SHA"
      - echo "branch     $CI_COMMIT_BRANCH"
      - echo "event      $CI_PIPELINE_EVENT"
      - echo "pipeline   $CI_PIPELINE_NUMBER"

  - name: install
    image: node:22-slim
    depends_on: [tier-0-metadata]
    commands:
      - npm ci

  # tier-1: CSP drift gate — fails if live CloudFront CSP drifts from
  # infra/cloudfront-security-headers.json or is missing required endpoints.
  # Requires AWS read access; uses the same Roles-Anywhere cred bootstrap as deploy.yml.
  - name: verify-csp
    image: public.ecr.aws/aws-cli/aws-cli:latest
    depends_on: [install]
    failure: ignore
    environment:
      AWS_DEFAULT_REGION: us-west-2
      AWS_PROFILE: ci-deploy
    commands:
      - yum install -y jq 2>/dev/null || apk add --no-cache jq 2>/dev/null || true
      - mkdir -p /root/.aws
      - |
        cat > /root/.aws/config <<EOF
        [profile ci-deploy]
        region = us-west-2
        credential_process = /usr/local/bin/aws_signing_helper credential-process --trust-anchor-arn arn:aws:rolesanywhere:us-west-2:211125425201:trust-anchor/5e54afa4-d3d7-4e42-bae6-68f9d126c7d7 --profile-arn arn:aws:rolesanywhere:us-west-2:211125425201:profile/2177db77-a33c-4e5b-bcce-21b908659406 --role-arn arn:aws:iam::211125425201:role/heraldstack-ci-deploy --certificate /workload.crt --private-key /workload.key
        EOF
      - chmod +x scripts/verify-csp.sh
      - ./scripts/verify-csp.sh

  - name: biome
    image: ghcr.io/biomejs/biome:2.4.13
    depends_on: [tier-0-metadata]
    failure: fail
    commands:
      - biome ci --diagnostic-level=error src/

  - name: typecheck
    image: node:22-slim
    depends_on: [install]
    failure: fail
    commands:
      # generate releases.generated.json before typecheck — file is gitignored, must be
      # produced at ci time. generator degrades gracefully when GITHUB_TOKEN is absent.
      - node scripts/fetch-releases.mjs
      - npx tsc --noEmit

  - name: build
    image: node:22-slim
    depends_on: [typecheck]
    failure: fail
    commands:
      - npm run build

  - name: audit
    image: node:22-slim
    depends_on: [install]
    failure: ignore
    commands:
      - npm audit --audit-level=high || true

  - name: scan-secrets
    image: zricethezav/gitleaks:latest
    failure: ignore
    depends_on: [tier-0-metadata]
    when:
      - event: [push, pull_request, manual]
    commands:
      - gitleaks detect --verbose --source . --exit-code 1
