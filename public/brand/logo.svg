  <!-- cloud silhouette via path — white on transparent, reads on dark jitsi bg -->
  <path d="M38 42 Q28 42 28 33 Q28 24 37 24 Q38 16 46 15 Q53 8 63 12 Q70 8 76 13 Q84 13 86 21 Q93 22 93 30 Q93 38 84 40 Z"
        fill="white" opacity="0.90"/>
