  </text>
  <text x="103" y="40" font-family="system-ui,-apple-system,BlinkMacSystemFont,sans-serif"
        font-size="9.5" font-weight="400" fill="white" opacity="0.65" letter-spacing="1.8">
    AWS USER GROUP
  </text>
</svg>
